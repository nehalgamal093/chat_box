name: Build and Upload to Appetize.io

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'

      - run: flutter pub get

      - name: Create .env file for iOS build
        run: |
          echo "FIREBASE_API_KEY=dummy_build_key" > .env

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..
      - name: Verify Firebase plist exists
        run: |
          if [ -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "✅ File exists"
            cat ios/Runner/GoogleService-Info.plist | head -20
          else
            echo "❌ File missing!"
            exit 1
          fi
      - name: Build for iOS Simulator
        run: flutter build ios --simulator --no-codesign

      - name: Zip the iOS Simulator build
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../ios-simulator.zip Runner.app
          cd ../../..

      - name: Install jq
        run: brew install jq

      - name: Upload iOS to Appetize
        id: ios_upload
        run: |
          RESPONSE=$(curl --silent --http1.1 \
            "https://api.appetize.io/v1/apps" \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@ios-simulator.zip" \
            -F "platform=ios")
          echo "iOS Public Key: $(echo $RESPONSE | jq -r '.publicKey')"
          echo "iOS URL: https://appetize.io/app/$(echo $RESPONSE | jq -r '.publicKey')"