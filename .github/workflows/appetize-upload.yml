name: Build and Upload to Appetize.io

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'

      - run: flutter pub get
      - run: flutter build apk --debug

      - name: Upload Android to Appetize
        id: android_upload
        run: |
          RESPONSE=$(curl --silent --http1.1 \
            "https://api.appetize.io/v2/apps" \
            -H "Authorization: Bearer ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/app/outputs/flutter-apk/app-debug.apk" \
            -F "platform=android")
          echo "Android Public Key: $(echo $RESPONSE | jq -r '.publicKey')"
          echo "Android URL: https://appetize.io/app/$(echo $RESPONSE | jq -r '.publicKey')"

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'

      - run: flutter pub get

      # --- Start of the Cleanup & Fix Section ---
      - name: Clean Flutter build cache
        run: flutter clean

      - name: Clean CocoaPods cache
        run: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace .symlinks
          cd ..

      - name: Update CocoaPods repo and install pods
        run: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..
      # --- End of Cleanup Section ---

      - name: Build for iOS Simulator
        run: flutter build ios --simulator --no-codesign

      - name: Zip the iOS Simulator build
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../ios-simulator.zip Runner.app
          cd ../../..

      - name: Upload iOS to Appetize
        id: ios_upload
        run: |
          RESPONSE=$(curl --silent --http1.1 \
            "https://api.appetize.io/v2/apps" \
            -H "Authorization: Bearer ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@ios-simulator.zip" \
            -F "platform=ios")
          echo "iOS Public Key: $(echo $RESPONSE | jq -r '.publicKey')"
          echo "iOS URL: https://appetize.io/app/$(echo $RESPONSE | jq -r '.publicKey')"